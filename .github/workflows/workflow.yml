name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  pull_request:

jobs:
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      is_new: ${{ steps.check_tag.outputs.is_new }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep -oP '^version\s*=\s*"\K[^"]+' pyproject.toml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "refs/tags/v${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "is_new=false" >> $GITHUB_OUTPUT
          else
            echo "is_new=true" >> $GITHUB_OUTPUT
          fi

  lint-and-test:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"
          
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: uv sync --all-groups
        
      - name: Run Ruff (Lint)
        uses: astral-sh/ruff-action@v4.0.0
        
      - name: Run Ty (Type check)
        run: uv run ty check .
        
      - name: Run Pytest
        run: uv run pytest

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"
          
      - name: Rust Security Check
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Python Security Check
        run: |
          uv pip install --system pip-audit
          uv export --format requirements-txt --all-groups -o requirements.txt
      - uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          virtual-environment: venv/
          no-deps: true

  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    needs: [lint-and-test, security]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
          
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: dist

  build-sdist:
    name: Build source distribution
    needs: [lint-and-test, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          
      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist, check-version]
    runs-on: ubuntu-latest
    # Only run on main branch pushes if the version is new
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.check-version.outputs.is_new == 'true'
    permissions:
      id-token: write # IMPORTANT: mandatory for trusted publishing
      contents: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: '*'
          merge-multiple: true
          path: dist
          
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    name: Create GitHub Release
    needs: [build-wheels, build-sdist, check-version]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.check-version.outputs.is_new == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      
      - name: Create Tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: '*'
          merge-multiple: true
          path: dist
          
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ needs.check-version.outputs.version }}"
          files: dist/*
          generate_release_notes: true

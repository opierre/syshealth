name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  pull_request:

jobs:
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      is_new: ${{ steps.check_tag.outputs.is_new }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep -oP '^version\s*=\s*"\K[^"]+' pyproject.toml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "refs/tags/v${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "is_new=false" >> $GITHUB_OUTPUT
          else
            echo "is_new=true" >> $GITHUB_OUTPUT
          fi

  lint-and-test:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Install uv
        id: install_uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          
      - name: Set up Python
        id: setup_python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"
          
      - name: Set up Rust
        id: setup_rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        id: install_deps
        run: uv sync --all-groups
        
      - name: Run Ruff (Lint)
        id: ruff
        uses: astral-sh/ruff-action@v4.0.0
        
      - name: Run Ty (Type check)
        id: ty
        if: success() || failure()
        run: uv run ty check .
        
      - name: Run Pytest
        id: pytest
        if: success() || failure()
        run: uv run pytest --cov-fail-under=80 --junitxml=pytest-report.xml
        
      - name: Generate Workflow Summary
        if: always()
        run: |
          status_icon() { case "$1" in success) echo "✅" ;; failure) echo "❌" ;; skipped) echo "⏭️" ;; *) echo "❓" ;; esac; }
          echo "## 🚀 CI/CD Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🛠️ Tools & Versions" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Tool | Version | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Setup | **Python** | \`$(python --version | awk '{print $2}' || echo 'Unknown')\` | $(status_icon '${{ steps.setup_python.outcome }}') |" >> $GITHUB_STEP_SUMMARY
          echo "| Setup | **Rust** | \`$(rustc --version | awk '{print $2}' || echo 'Unknown')\` | $(status_icon '${{ steps.setup_rust.outcome }}') |" >> $GITHUB_STEP_SUMMARY
          echo "| Setup | **uv** | \`$(uv --version | awk '{print $2}' || echo 'Unknown')\` | $(status_icon '${{ steps.install_uv.outcome }}') |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | **Ruff** | \`v4.0.0\` | $(status_icon '${{ steps.ruff.outcome }}') |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Check | **Ty** | \`$(uv run ty --version 2>/dev/null | awk '{print $2}' || echo 'Unknown')\` | $(status_icon '${{ steps.ty.outcome }}') |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | **Pytest** | \`$(uv run pytest --version 2>&1 | awk '{print $2}' || echo 'Unknown')\` | $(status_icon '${{ steps.pytest.outcome }}') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 🧪 Test Results & Coverage" >> $GITHUB_STEP_SUMMARY
          uv run coverage json
          
          python -c "
          import xml.etree.ElementTree as ET, json
          try:
              tree = ET.parse('pytest-report.xml')
              ts = tree.getroot() if tree.getroot().tag == 'testsuite' else tree.find('.//testsuite')
              tests = int(ts.get('tests', 0))
              fails = int(ts.get('failures', 0))
              errs = int(ts.get('errors', 0))
              skips = int(ts.get('skipped', 0))
              passed = tests - fails - errs - skips
          except:
              tests, passed, fails, skips, errs = 0, 0, 0, 0, 0
          
          try:
              with open('coverage.json') as f:
                  cov = json.load(f)['totals']['percent_covered_display'] + '%'
          except:
              cov = 'N/A'
          
          print('| Total Tests | Passed ✅ | Failed ❌ | Skipped ⏭️ | Errors ⚠️ | Coverage 📊 |')
          print('|-------------|-----------|-----------|------------|-----------|------------|')
          print(f'| {tests} | {passed} | {fails} | {skips} | {errs} | {cov} |')
          " >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Generate Coverage Summary
        if: always()
        run: uv run coverage report --format=markdown >> $GITHUB_STEP_SUMMARY

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Rust Security Check
        id: rust_audit
        run: |
          cargo install cargo-audit
          cargo audit --color never 2>&1 | tee rust_audit.log
          exit ${PIPESTATUS[0]}
          
      - name: Python Security Check
        id: python_audit
        if: success() || failure()
        run: |
          uv audit --color never 2>&1 | tee python_audit.log
          exit ${PIPESTATUS[0]}

      - name: Generate Security Summary
        if: always()
        run: |
          status_icon() { case "$1" in success) echo "✅" ;; failure) echo "❌" ;; skipped) echo "⏭️" ;; *) echo "❓" ;; esac; }
          echo "## 🛡️ Security Checks Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | Version | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **cargo-audit** | \`$(cargo audit --version 2>/dev/null | awk '{print $2}' || echo 'Unknown')\` | $(status_icon '${{ steps.rust_audit.outcome }}') |" >> $GITHUB_STEP_SUMMARY
          echo "| **pip-audit** | \`$(uvx --quiet pip-audit --version 2>/dev/null | awk '{print $2}' || echo 'Unknown')\` | $(status_icon '${{ steps.python_audit.outcome }}') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "<details><summary><b>Rust Audit Output</b></summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          cat rust_audit.log >> $GITHUB_STEP_SUMMARY || echo "No output recorded." >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "<details><summary><b>Python Audit Output</b></summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          cat python_audit.log >> $GITHUB_STEP_SUMMARY || echo "No output recorded." >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    needs: [lint-and-test, security]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
          
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: dist

  build-sdist:
    name: Build source distribution
    needs: [lint-and-test, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          
      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist, check-version]
    runs-on: ubuntu-latest
    # Only run on main branch pushes if the version is new
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.check-version.outputs.is_new == 'true'
    permissions:
      id-token: write # IMPORTANT: mandatory for trusted publishing
      contents: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: '*'
          merge-multiple: true
          path: dist
          
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    name: Create GitHub Release
    needs: [build-wheels, build-sdist, check-version]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.check-version.outputs.is_new == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      
      - name: Create Tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: '*'
          merge-multiple: true
          path: dist
          
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ needs.check-version.outputs.version }}"
          files: dist/*
          generate_release_notes: true
